job:
  image:
    repository: quay.io/inference-perf/inference-perf
    tag: main
  serviceAccountName: inference-perf-sa

  nodeSelector:
    cloud.google.com/machine-family: c3
  resources:
     requests:
       cpu: "150"
       memory: "180Gi"

logLevel: INFO

token:
  hfSecret:
    name: hf-secret
    key: token

config:
  load:
    type: constant
    stages:
      - rate: 0.5
        duration: 15
      - rate: 10
        duration: 300
    num_workers: 150                 # Concurrent worker threads (default: CPU_cores)
    worker_max_concurrency: 1        # Max concurrent requests per worker
    worker_max_tcp_connections: 2500 # Max TCP connections per worker
  api:
    type: completion
    streaming: true
  server:
    type: vllm
    model_name: deepseek-ai/DeepSeek-V4-Flash
    base_url: http://optimized-baseline-sim-standalone-epp:80
  data:
    type: shared_prefix
    shared_prefix:
      num_groups: 5               # Number of distinct prefix, Note: the number of users is num_groups * num_prompts_per_group
      num_prompts_per_group: 5      # Number of unique questions per group (prefix)
      system_prompt_len: 994000       # Length of the first prefix (in tokens), simulate initialization of a system prompt
      question_len: 5000             # Length of the unique question part (in tokens)
      output_len: 1000              # Target length for the model's generated output (in tokens)
      enable_multi_turn_chat: false # If enabled, the chat context will be appended for the each request.
  report:
    request_lifecycle:
      summary: true
      per_stage: true
      per_request: false

  storage:
    local:
      path: "./reports"