# Router configuration that picks random backend and uses the passthrough parser
# which avoids JSON serialization.
router:
  extraServicePorts:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8081

  epp:
    replicas: 1
    image:
      registry: ghcr.io/llm-d
      repository: llm-d-router-endpoint-picker-dev
      tag: main
      pullPolicy: Always
    flags:
      v: 4
      enable-pprof: "true"
      tracing: "false"
    pluginsConfigFile: "optimized-baseline-plugins.yaml"
    pluginsCustomConfig:
      optimized-baseline-plugins.yaml: |
        apiVersion: llm-d.ai/v1alpha1
        kind: EndpointPickerConfig
        plugins:
        - type: random-picker
        - type: passthrough-parser
        requestHandler:
          parsers:
          - pluginRef: passthrough-parser
        schedulingProfiles:
        - name: default
          plugins:
          - pluginRef: random-picker

  inferencePool:
    failureMode: "FailOpen"

  modelServers:
    protocol: http

  proxy:
    args:
      - "--service-node"
      - "envoy-sidecar"
      - "--log-level"
      - "warn"
      - "--concurrency"
      - "32"
      - "--drain-strategy"
      - "immediate"
      - "--drain-time-s"
      - "60"
      - "-c"
      - "/etc/envoy/envoy.yaml"
    resources:
      requests:
        cpu: "4"
        memory: 8Gi
      limits:
        memory: 16Gi

  tracing:
    otelExporterEndpoint: "http://localhost:4317"
    sampling:
      sampler: "parentbased_traceidratio"
      samplerArg: "0.1"