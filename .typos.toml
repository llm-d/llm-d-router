[default.extend-words]
k8s = "k8s"
KServe = "KServe"
vLLM = "vLLM"
IST = "IST"
# American English (Go stdlib uses Unmarshal)
unmarshaling = "unmarshaling"
# image_grid_thw is a vLLM/CUDA tensor shape parameter
thw = "thw"

[files]
extend-exclude = [
    "*.png",
    "*.jpg",
    "deploy/",
    "go.mod",
    "go.sum",
    "build/",
    "testdata/",
    # Generated protobuf files
    "pkg/epp/framework/plugins/requesthandling/parsers/vllmgrpc/api/gen/",
    # Release-note fragments are sourced verbatim from PR bodies; let the
    # original PR's typo check be authoritative.
    "release-notes.d/",
    "RELEASE-NOTES.md"
]

