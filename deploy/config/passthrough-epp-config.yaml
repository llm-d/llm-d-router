# Sample EPP configuration for request-format agnostic routing.
#
# Use this when the request format is unknown or unsupported, so the EPP
# cannot rely on scorers that need to read the request body (e.g. the
# prefix-cache scorer). It pairs the passthrough parser with scorers that
# route purely on backend state:
#   - active-request-scorer  : prefers the least busy endpoint
#   - session-affinity-scorer: keeps a session pinned to the same endpoint
#
# Note: the parser is selected explicitly below. If requestHandler.parsers is
# omitted, the EPP applies the openai-parser by default (see ensureParsers in
# pkg/epp/config/loader/defaults.go), which expects an OpenAI-style body.
apiVersion: llm-d.ai/v1alpha1
kind: EndpointPickerConfig
plugins:
- type: passthrough-parser
- type: active-request-scorer
- type: session-affinity-scorer
- type: decode-filter
- type: max-score-picker
- type: single-profile-handler
requestHandler:
  parsers:
  - pluginRef: passthrough-parser
schedulingProfiles:
- name: default
  plugins:
  - pluginRef: decode-filter
  - pluginRef: max-score-picker
  - pluginRef: active-request-scorer
    weight: 1
  - pluginRef: session-affinity-scorer
    weight: 1
