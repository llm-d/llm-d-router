apiVersion: v1
kind: Service
metadata:
  name: ${EPP_NAME}${EPP_SUFFIX}
  labels:
    app: ${EPP_NAME}${EPP_SUFFIX}
spec:
  selector:
    app: ${EPP_NAME}${EPP_SUFFIX}
  ports:
  - name: default
    protocol: TCP
    port: 9002
    targetPort: 9002
    appProtocol: http2
  - name: metrics
    protocol: TCP
    port: 9090
    targetPort: 9090
  type: ClusterIP
