name: CI - Build Builder Image
on:
  push:
    branches:
      - main
    paths:
      - Dockerfile.builder
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile.builder
permissions:
  contents: read
  packages: write
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  build-builder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Compute image tag
        id: tag
        run: echo "sha=$(sha256sum Dockerfile.builder | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Build builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.builder
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/llm-d/llm-d-builder:latest
            ghcr.io/llm-d/llm-d-builder:${{ steps.tag.outputs.sha }}
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder
